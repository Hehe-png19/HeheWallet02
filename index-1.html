<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0b0b10">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dompetku">
<title>Dompetku</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  /*
   * Tidak ada request eksternal sama sekali.
   * Semua font = system font yang sudah ada di Android & iOS.
   * --font-display : heading/label bold (Google Sans / Roboto pakai weight 700-800)
   * --font-body    : teks biasa (Roboto = default Android, San Francisco = iOS)
   */
  :root {
    --font-display: 'Syne', 'Google Sans', 'Roboto', system-ui, -apple-system, sans-serif;
    --font-body:    'DM Sans', 'Roboto', system-ui, -apple-system, sans-serif;
    --accent: #c8f04a;
    --accent-dim: #a8d03a;
    --bg: #080810;
    --bg2: #0f0f18;
    --bg3: #14141e;
    --card: #13131c;
    --border: #1f1f2e;
    --border2: #282838;
    --text: #f0f0f6;
    --text2: #8888aa;
    --text3: #44445a;
    --red: #ff6b6b;
    --blue: #5b8fff;
  }
</style>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html { font-size: clamp(13px, 3.8vw, 16px); }
  html, body { height: 100%; overflow: hidden; }
  body { font-family: var(--font-body); background: var(--bg); color: var(--text); }
  input, select, textarea, button { font-family: var(--font-body); font-size: 1rem; }
  ::-webkit-scrollbar { display: none; }
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }

  #app { height: 100vh; display: flex; flex-direction: column; max-width: 420px; margin: 0 auto; }
  .page { flex: 1; overflow-y: auto; padding-bottom: 88px; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  @keyframes slideIn { from{opacity:0;transform:translateX(24px)} to{opacity:1;transform:translateX(0)} }
  @keyframes pop { 0%{transform:scale(0.92)} 60%{transform:scale(1.04)} 100%{transform:scale(1)} }
  @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(-10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
  @keyframes shimmer { from{background-position:-200%} to{background-position:200%} }
  @keyframes glow { 0%,100%{box-shadow:0 0 20px rgba(200,240,74,0.15)} 50%{box-shadow:0 0 32px rgba(200,240,74,0.3)} }

  .fade-up { animation: fadeUp 0.3s cubic-bezier(0.22,1,0.36,1) both; }
  .slide-in { animation: slideIn 0.28s cubic-bezier(0.22,1,0.36,1) both; }

  /* NAV */
  .bottom-nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 420px;
    background: rgba(10,10,18,0.96); backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex; padding: 10px 0 22px; z-index: 100;
  }
  .nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; background:none; border:none; cursor:pointer; padding:0; }
  .nav-icon { font-size:1.25rem; line-height:1; }
  .nav-label { font-size:0.6rem; font-family:var(--font-display); font-weight:700; color:var(--text3); letter-spacing:0.3px; }
  .nav-label.active { color:var(--accent); }
  .nav-add-btn {
    width:3rem; height:3rem; border-radius:18px; background:var(--accent);
    display:flex; align-items:center; justify-content:center;
    font-family:var(--font-display); font-weight:800; font-size:1.7rem; color:#0b0b10;
    margin-top:-1.2rem; box-shadow:0 4px 20px rgba(200,240,74,0.35);
    transition: transform 0.15s;
  }
  .nav-btn:active .nav-add-btn { transform: scale(0.93); }

  /* CARDS */
  .card { background:var(--card); border:1px solid var(--border2); border-radius:18px; }

  /* WALLET CARD */
  .wallet-card {
    border-radius:22px; padding:18px 20px;
    display:flex; align-items:center; gap:14px;
    cursor:pointer; transition:transform 0.15s, opacity 0.15s;
    position:relative; overflow:hidden;
  }
  .wallet-card::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at top right, rgba(255,255,255,0.04) 0%, transparent 60%); pointer-events:none; }
  .wallet-card:active { transform:scale(0.97); opacity:0.85; }
  .wallet-icon-wrap { width:3.2rem; height:3.2rem; border-radius:16px; background:rgba(0,0,0,0.25); display:flex; align-items:center; justify-content:center; font-size:1.5rem; flex-shrink:0; }
  .wallet-info { flex:1; min-width:0; }
  .wallet-name { font-family:var(--font-display); font-size:0.94rem; font-weight:800; color:#fff; letter-spacing:-0.2px; }
  .wallet-budget { font-size:0.69rem; opacity:0.65; margin-top:2px; }
  .wallet-balance { font-family:var(--font-display); font-size:1.1rem; font-weight:800; text-align:right; flex-shrink:0; }
  .wallet-bar { position:absolute; bottom:0; left:0; height:3px; border-radius:99px; transition:width 0.5s ease; }

  /* TX ITEM */
  .tx-item { display:flex; align-items:center; gap:12px; padding:13px 16px; cursor:pointer; transition:opacity 0.15s; }
  .tx-item:active { opacity:0.7; }
  .tx-icon { width:2.6rem; height:2.6rem; border-radius:14px; background:#1e1e2c; display:flex; align-items:center; justify-content:center; font-size:1.1rem; flex-shrink:0; }
  .tx-info { flex:1; min-width:0; }
  .tx-name { font-family:var(--font-display); font-size:0.82rem; font-weight:700; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .tx-sub { font-size:0.69rem; color:var(--text3); margin-top:2px; }
  .tx-amount { font-family:var(--font-display); font-weight:800; font-size:0.9rem; flex-shrink:0; }

  /* FORM */
  .form-label { font-size:0.68rem; color:var(--text3); letter-spacing:1.2px; text-transform:uppercase; margin-bottom:8px; font-family:var(--font-display); font-weight:700; }
  .form-input { width:100%; background:var(--bg3); border:1.5px solid var(--border2); border-radius:16px; padding:14px 16px; color:#fff; font-size:0.9rem; outline:none; transition:border-color 0.2s, box-shadow 0.2s; }
  .form-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(200,240,74,0.1); }

  /* PILLS */
  .filter-pill { padding:7px 16px; border-radius:99px; border:1.5px solid var(--border2); background:var(--bg3); color:var(--text2); font-family:var(--font-display); font-weight:700; font-size:0.68rem; cursor:pointer; transition:all 0.15s; letter-spacing:0.3px; }
  .filter-pill.active { background:var(--accent); color:#0b0b10; border-color:var(--accent); }

  /* TYPE TOGGLE */
  .type-toggle { display:flex; background:var(--bg3); border-radius:16px; padding:4px; border:1.5px solid var(--border2); }
  .type-btn { flex:1; padding:11px; border-radius:12px; border:none; font-family:var(--font-display); font-weight:700; font-size:0.82rem; cursor:pointer; transition:all 0.2s; background:transparent; color:var(--text3); }
  .type-btn.active-out { background:var(--red); color:#fff; }
  .type-btn.active-in { background:var(--accent); color:#0b0b10; }

  .big-btn { width:100%; padding:16px; border:none; border-radius:18px; font-family:var(--font-display); font-weight:800; font-size:1rem; cursor:pointer; transition:opacity 0.15s, transform 0.1s; letter-spacing:-0.2px; }
  .big-btn:active { opacity:0.85; transform:scale(0.98); }

  .toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); padding:10px 22px; border-radius:99px; font-family:var(--font-display); font-weight:700; font-size:0.8rem; z-index:999; white-space:nowrap; animation:toastIn 0.3s ease; box-shadow:0 4px 24px rgba(0,0,0,0.4); }

  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.82); backdrop-filter:blur(6px); display:flex; align-items:center; justify-content:center; z-index:998; padding:20px; }
  .modal-box { background:#171724; border:1px solid var(--border2); border-radius:24px; padding:24px; width:100%; max-width:360px; animation:pop 0.2s ease; max-height:80vh; overflow-y:auto; box-shadow:0 24px 80px rgba(0,0,0,0.6); }

  .detail-row { display:flex; justify-content:space-between; padding:13px 16px; background:#181828; border-radius:14px; }
  .detail-label { font-size:0.74rem; color:var(--text3); font-family:var(--font-display); font-weight:700; letter-spacing:0.5px; }
  .detail-val { font-size:0.82rem; color:#ccc; font-weight:500; }

  .section-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
  .section-title { font-family:var(--font-display); font-size:0.82rem; font-weight:800; color:#fff; letter-spacing:-0.2px; }
  .see-all { font-size:0.69rem; color:var(--accent); font-family:var(--font-display); font-weight:700; background:none; border:none; cursor:pointer; }

  .empty-state { text-align:center; padding:40px 0; color:var(--text3); font-size:0.82rem; }
  .empty-icon { font-size:2.5rem; margin-bottom:10px; filter:grayscale(0.5); }

  .back-btn { background:none; border:none; color:var(--accent); font-family:var(--font-display); font-weight:700; font-size:0.82rem; cursor:pointer; margin-bottom:20px; display:flex; align-items:center; gap:6px; opacity:0.9; }
  .back-btn:active { opacity:0.6; }
  .wallet-sel-item { display:flex; align-items:center; gap:12px; padding:13px 16px; border-radius:16px; cursor:pointer; transition:background 0.15s; border:2px solid transparent; }
  .wallet-sel-item:active { background:#1e1e2c; }
  .wallet-sel-item.selected { border-color:var(--accent); background:#1a2800; }

  /* AUTH */
  .auth-page { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; z-index:9999; }
  .auth-logo { font-family:var(--font-display); font-size:2.5rem; font-weight:800; color:var(--accent); margin-bottom:4px; }
  .auth-sub { font-size:0.72rem; color:var(--text3); letter-spacing:3px; text-transform:uppercase; margin-bottom:40px; }
  .auth-card { width:100%; max-width:380px; background:var(--card); border:1px solid var(--border2); border-radius:24px; padding:28px; }
  .auth-tab { display:flex; background:#0d0d18; border-radius:14px; padding:4px; margin-bottom:22px; }
  .auth-tab-btn { flex:1; padding:10px; border-radius:10px; border:none; font-family:var(--font-display); font-weight:700; font-size:0.82rem; cursor:pointer; transition:all 0.2s; background:transparent; color:var(--text3); }
  .auth-tab-btn.active { background:var(--accent); color:#0b0b10; }
  .sync-dot { width:7px; height:7px; border-radius:99px; display:inline-block; margin-right:5px; flex-shrink:0; }
  .sync-dot.synced { background:var(--accent); }
  .sync-dot.syncing { background:#ffb347; animation: pulse 1s infinite; }
  .sync-dot.offline { background:#555; }
  .sync-dot.error { background:var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .user-bar { display:flex; align-items:center; gap:8px; padding:10px 16px; background:#0d0d18; border-bottom:1px solid var(--border); font-size:0.69rem; color:var(--text3); }
  .user-bar-email { flex:1; color:var(--text2); font-family:var(--font-display); font-weight:700; font-size:0.69rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .logout-btn { background:none; border:none; color:var(--red); font-family:var(--font-display); font-weight:700; font-size:0.69rem; cursor:pointer; padding:4px 8px; border-radius:8px; }
</style>
</head>
<body>
<div id="app">
  <!-- Auth Overlay -->
  <div class="auth-page" id="auth-page">
    <div class="auth-logo">🪙 Dompetku</div>
    <div class="auth-sub">Catatan Keuangan Pribadi</div>
    <div class="auth-card">
      <div class="auth-tab">
        <button class="auth-tab-btn active" id="tab-login" onclick="switchAuthTab('login')">Masuk</button>
        <button class="auth-tab-btn" id="tab-register" onclick="switchAuthTab('register')">Daftar</button>
      </div>
      <div id="auth-form-wrap">
        <div style="margin-bottom:16px">
          <div class="form-label">Email</div>
          <input class="form-input" id="auth-email" type="email" placeholder="email@contoh.com" autocomplete="email">
        </div>
        <div style="margin-bottom:22px">
          <div class="form-label">Password</div>
          <input class="form-input" id="auth-password" type="password" placeholder="Min. 6 karakter" autocomplete="current-password">
        </div>
        <button class="big-btn" id="auth-submit-btn" style="background:#c8f04a;color:#0b0b10" onclick="doAuth()">Masuk</button>
        <div id="auth-error" style="margin-top:12px;font-size:0.75rem;color:#ff6b6b;text-align:center;display:none"></div>
        <div id="auth-loading" style="margin-top:12px;font-size:0.75rem;color:var(--text2);text-align:center;display:none">⏳ Mohon tunggu...</div>
      </div>
    </div>
    <div style="margin-top:18px;font-size:0.69rem;color:#333;text-align:center">Data tersimpan aman di cloud ☁️</div>
  </div>

  <!-- User Bar -->
  <div class="user-bar" id="user-bar" style="display:none">
    <span class="sync-dot offline" id="sync-dot"></span>
    <span class="user-bar-email" id="user-email-label">-</span>
    <button class="logout-btn" onclick="doLogout()">Keluar</button>
  </div>

  <div class="page" id="page-content"></div>
  <nav class="bottom-nav" id="bottom-nav"></nav>
</div>
<div class="toast" id="toast" style="display:none"></div>
<div class="modal-overlay" id="modal" style="display:none" onclick="if(event.target===this)hideModal()">
  <div class="modal-box" id="modal-box"></div>
</div>

<script>
// ─── SUPABASE CONFIG ──────────────────────────────────────────────
// Ganti nilai di bawah ini dengan URL dan anon key dari project Supabase kamu.
// Atau bisa konfigurasi lewat tombol "Konfigurasi" di halaman login.
const SUPABASE_CONFIG_KEY = 'dompetku_supabase_cfg';

function getSupabaseCfg() {
  // Hardcoded config — tidak perlu input manual
  return {
    url: 'https://qerwbklzajwylhwsfgqt.supabase.co',
    key: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFlcndia2x6YWp3eWxod3NmZ3F0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MDgxOTYsImV4cCI6MjA5NTE4NDE5Nn0.xeNRGjrMDhvSF2pWTUEZf-bdgaz0ex8BbVm-ikA-39M'
  };
}
function setSupabaseCfg(url, key) {
  localStorage.setItem(SUPABASE_CONFIG_KEY, JSON.stringify({ url, key }));
}

let sb = null; // Supabase client instance

function initSupabase() {
  const cfg = getSupabaseCfg();
  if (cfg.url && cfg.key) {
    try {
      sb = window.supabase.createClient(cfg.url, cfg.key);
      return true;
    } catch(e) { console.warn('Supabase init failed', e); return false; }
  }
  return false;
}

// ─── AUTH STATE ───────────────────────────────────────────────────
let authUser = null;
let syncStatus = 'offline'; // offline | syncing | synced | error
let authTab = 'login';

function setSyncStatus(s) {
  syncStatus = s;
  const dot = document.getElementById('sync-dot');
  if (!dot) return;
  dot.className = 'sync-dot ' + s;
  dot.title = s === 'synced' ? 'Tersinkron' : s === 'syncing' ? 'Menyinkron...' : s === 'error' ? 'Gagal sync' : 'Offline';
}

function switchAuthTab(tab) {
  authTab = tab;
  document.getElementById('tab-login').className = 'auth-tab-btn' + (tab==='login'?' active':'');
  document.getElementById('tab-register').className = 'auth-tab-btn' + (tab==='register'?' active':'');
  document.getElementById('auth-submit-btn').textContent = tab==='login' ? 'Masuk' : 'Daftar';
  document.getElementById('auth-error').style.display = 'none';
}

function showSupabaseConfig() {
  const cfg = getSupabaseCfg();
  showModal(`
    <div style="font-family:var(--font-display);font-size:1rem;font-weight:700;color:#fff;margin-bottom:4px">Konfigurasi Supabase</div>
    <div style="font-size:0.72rem;color:var(--text3);margin-bottom:18px">Dapatkan URL & Key dari dashboard.supabase.com → Project Settings → API</div>
    <div style="margin-bottom:14px">
      <div class="form-label">Project URL</div>
      <input class="form-input" id="sb-url" type="url" placeholder="https://xxxx.supabase.co" value="${cfg.url||''}">
    </div>
    <div style="margin-bottom:20px">
      <div class="form-label">Anon Public Key</div>
      <input class="form-input" id="sb-key" type="text" placeholder="eyJ..." value="${cfg.key||''}">
    </div>
    <div style="display:flex;gap:10px">
      <button onclick="hideModal()" style="flex:1;padding:12px;background:#1c1c2c;border:none;border-radius:12px;color:#bbb;font-family:var(--font-display);font-weight:700;font-size:0.81rem;cursor:pointer">Batal</button>
      <button onclick="saveSupabaseCfg()" style="flex:1;padding:12px;background:#c8f04a;border:none;border-radius:12px;color:#0b0b10;font-family:var(--font-display);font-weight:700;font-size:0.81rem;cursor:pointer">Simpan</button>
    </div>
  `);
}

function saveSupabaseCfg() {
  const url = document.getElementById('sb-url').value.trim();
  const key = document.getElementById('sb-key').value.trim();
  if (!url || !key) return showToast('Isi URL dan Key!','#ff6b6b','#fff');
  setSupabaseCfg(url, key);
  hideModal();
  initSupabase();
  showToast('Konfigurasi disimpan ✓');
}

async function doAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const pw    = document.getElementById('auth-password').value;
  const errEl = document.getElementById('auth-error');
  const loadEl= document.getElementById('auth-loading');
  errEl.style.display = 'none';

  if (!email || !pw) { errEl.textContent='Isi email dan password!'; errEl.style.display='block'; return; }
  if (!sb) {
    if (!initSupabase()) {
      errEl.textContent='Konfigurasi Supabase belum diatur. Klik "Konfigurasi" di bawah.';
      errEl.style.display='block'; return;
    }
  }

  loadEl.style.display='block';
  document.getElementById('auth-submit-btn').disabled=true;

  try {
    let result;
    if (authTab === 'login') {
      result = await sb.auth.signInWithPassword({ email, password: pw });
    } else {
      result = await sb.auth.signUp({ email, password: pw });
    }
    if (result.error) throw result.error;
    // session handled via onAuthStateChange
  } catch(e) {
    errEl.textContent = e.message || 'Gagal autentikasi';
    errEl.style.display = 'block';
  } finally {
    loadEl.style.display='none';
    document.getElementById('auth-submit-btn').disabled=false;
  }
}

async function doLogout() {
  if (sb) await sb.auth.signOut();
  authUser = null;
  document.getElementById('auth-page').style.display='flex';
  document.getElementById('user-bar').style.display='none';
  setSyncStatus('offline');
}

// ─── SUPABASE SYNC ────────────────────────────────────────────────
async function syncToSupabase() {
  if (!sb || !authUser) return;
  setSyncStatus('syncing');
  try {
    const payload = {
      user_id: authUser.id,
      txs: state.txs,
      wallets: state.wallets,
      updated_at: new Date().toISOString(),
    };
    const { error } = await sb.from('dompetku_data').upsert(payload, { onConflict: 'user_id' });
    if (error) throw error;
    setSyncStatus('synced');
  } catch(e) {
    console.warn('Sync error', e);
    setSyncStatus('error');
    showToast('Sync gagal: '+e.message,'#ff6b6b','#fff');
  }
}

async function loadFromSupabase() {
  if (!sb || !authUser) return false;
  setSyncStatus('syncing');
  try {
    const { data, error } = await sb.from('dompetku_data').select('*').eq('user_id', authUser.id).single();
    if (error && error.code !== 'PGRST116') throw error; // PGRST116 = not found (first time)
    if (data) {
      state.txs     = data.txs     || [];
      state.wallets = data.wallets && data.wallets.length ? data.wallets : JSON.parse(JSON.stringify(DEFAULT_WALLETS));
      // juga update localStorage sebagai cache offline
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.txs)); } catch{}
      try { localStorage.setItem(WALLET_KEY,  JSON.stringify(state.wallets)); } catch{}
    }
    setSyncStatus('synced');
    return true;
  } catch(e) {
    console.warn('Load from Supabase error', e);
    setSyncStatus('error');
    return false;
  }
}

function onUserLoggedIn(user) {
  authUser = user;
  document.getElementById('auth-page').style.display='none';
  document.getElementById('user-bar').style.display='flex';
  document.getElementById('user-email-label').textContent = user.email;
  setSyncStatus('syncing');

  // Load data dari Supabase dulu, baru render
  loadFromSupabase().then(() => render());
}

// ─── INIT AUTH ────────────────────────────────────────────────────
function initAuth() {
  if (!initSupabase()) {
    // Tidak ada config Supabase — tetap tampilkan auth page
    return;
  }

  // Listen auth state changes
  sb.auth.onAuthStateChange((event, session) => {
    if (session && session.user) {
      onUserLoggedIn(session.user);
    } else if (event === 'SIGNED_OUT') {
      authUser = null;
      document.getElementById('auth-page').style.display='flex';
      document.getElementById('user-bar').style.display='none';
    }
  });

  // Cek session aktif
  sb.auth.getSession().then(({ data }) => {
    if (data.session && data.session.user) {
      onUserLoggedIn(data.session.user);
    }
  });
}

initAuth();
</script>

<script>
// ─── WALLETS CONFIG ───────────────────────────────────────────────
const DEFAULT_WALLETS = [
  { id:'makan',   name:'Makan & Keperluan', icon:'🛒', color:'#ffb347', budget:500000, balance:0 },
  { id:'tabungan',name:'Tabungan',          icon:'🏦', color:'#5b8fff', budget:0,      balance:0 },
  { id:'darurat', name:'Dana Darurat',      icon:'🛡️', color:'#b388ff', budget:0,      balance:0 },
  { id:'lainnya', name:'Lainnya',           icon:'📌', color:'#888',    budget:0,      balance:0 },
];

const STORAGE_KEY = 'dompetku_wallet_v1';
const WALLET_KEY  = 'dompetku_wallets_v1';

// ─── STATE ────────────────────────────────────────────────────────
let state = {
  page: 'home',
  txs: [],
  wallets: [],
  filter: 'minggu',
  selectedWalletId: null,
  selectedTxId: null,
  form: { type:'out', walletId:'', amount:'', note:'', date:today() },
  editingWallet: null,
  wForm: { name:'', icon:'🪙', color:'#c8f04a', budget:'', balance:'' },
  calc: { display:'0', expr:'', prev:0, op:'', fresh:true },
};

function load() {
  try { const r=localStorage.getItem(STORAGE_KEY); if(r) state.txs=JSON.parse(r); } catch{}
  try {
    const w=localStorage.getItem(WALLET_KEY);
    state.wallets = w ? JSON.parse(w) : JSON.parse(JSON.stringify(DEFAULT_WALLETS));
  } catch { state.wallets = JSON.parse(JSON.stringify(DEFAULT_WALLETS)); }
}
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.txs)); } catch{}
  try { localStorage.setItem(WALLET_KEY,  JSON.stringify(state.wallets)); } catch{}
  // Sync ke Supabase jika sudah login
  syncToSupabase();
}
function today() { return new Date().toISOString().slice(0,10); }
function formatRp(n) { return 'Rp'+Number(n).toLocaleString('id-ID'); }
function getWeekStart(d) { const dt=new Date(d); dt.setDate(dt.getDate()-dt.getDay()+1); return dt.toISOString().slice(0,10); }

function walletById(id) { return state.wallets.find(w=>w.id===id); }

// ─── WALLET BALANCE ───────────────────────────────────────────────
function walletTxs(walletId, filter) {
  const now = new Date();
  const thisWeek = getWeekStart(now.toISOString().slice(0,10));
  const thisMonth = now.toISOString().slice(0,7);
  return state.txs.filter(t => {
    if(t.walletId !== walletId) return false;
    if(filter==='minggu') return getWeekStart(t.date)===thisWeek;
    if(filter==='bulan') return t.date.slice(0,7)===thisMonth;
    return true;
  });
}
function walletBalance(walletId, filter) {
  return walletTxs(walletId, filter).reduce((s,t)=> t.type==='in' ? s+t.amount : s-t.amount, 0);
}
function walletSpent(walletId, filter) {
  return walletTxs(walletId, filter).filter(t=>t.type==='out').reduce((s,t)=>s+t.amount,0);
}

// ─── GLOBAL TOTALS ────────────────────────────────────────────────
function globalTotals(filter) {
  const now=new Date();
  const thisWeek=getWeekStart(now.toISOString().slice(0,10));
  const thisMonth=now.toISOString().slice(0,7);
  const txs = state.txs.filter(t=>{
    if(filter==='minggu') return getWeekStart(t.date)===thisWeek;
    if(filter==='bulan') return t.date.slice(0,7)===thisMonth;
    return true;
  });
  const totalIn  = txs.filter(t=>t.type==='in').reduce((s,t)=>s+t.amount,0);
  const totalOut = txs.filter(t=>t.type==='out').reduce((s,t)=>s+t.amount,0);
  return { totalIn, totalOut, saldo: totalIn-totalOut };
}

// ─── TOAST ───────────────────────────────────────────────────────
let toastTimer;
function showToast(msg,color='#c8f04a',textColor='#0b0b10'){
  const el=document.getElementById('toast');
  el.textContent=msg; el.style.background=color; el.style.color=textColor; el.style.display='block';
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.style.display='none',2200);
}

// ─── MODAL ───────────────────────────────────────────────────────
function showModal(html){ document.getElementById('modal-box').innerHTML=html; document.getElementById('modal').style.display='flex'; }
function hideModal(){ document.getElementById('modal').style.display='none'; }

// ─── NAV ─────────────────────────────────────────────────────────
function renderNav(){
  const p=state.page;
  const homeActive = p==='home';
  const walletActive = p==='wallets'||p==='wallet-detail'||p==='add-wallet'||p==='edit-wallet';

  document.getElementById('bottom-nav').innerHTML=`
    <button class="nav-btn" onclick="go('home')">
      <span class="nav-icon">🏠</span>
      <span class="nav-label ${homeActive?'active':''}">Home</span>
    </button>
    <button class="nav-btn" onclick="go('wallets')">

      <span class="nav-label ${walletActive?'active':''}">Dompet</span>
    </button>

      <span class="nav-label ${p==='add'?'active':''}" style="margin-top:2px">Catat</span>
    </button>
    <button class="nav-btn" onclick="go('history')">
      <span class="nav-icon">📋</span>
      <span class="nav-label ${histActive?'active':''}">Riwayat</span>
    </button>
    <button class="nav-btn" onclick="go('calc')">
      <span class="nav-icon">🧮</span>
      <span class="nav-label ${p==='calc'?'active':''}">Kalkulator</span>
    </button>
  `;
}

// ─── RENDER MAIN ─────────────────────────────────────────────────
function render(){
  renderNav();
  const p=state.page;
  document.getElementById('page-content').scrollTop=0;
  if(p==='home')          renderHome();
  else if(p==='wallets')  renderWallets();
  else if(p==='wallet-detail') renderWalletDetail();
  else if(p==='add')      renderAdd();
  else if(p==='history')  renderHistory();
  else if(p==='tx-detail') renderTxDetail();
  else if(p==='add-wallet') renderAddWallet();
  else if(p==='edit-wallet') renderEditWallet();
  else if(p==='backup')   renderBackup();
  else if(p==='calc')     renderCalc();
}
function go(page){ state.page=page; render(); }

// ─── BACKUP & RESTORE ────────────────────────────────────────────
function exportData(){
  const data = { txs: state.txs, wallets: state.wallets, exportedAt: new Date().toISOString(), version: 1 };
  const json = JSON.stringify(data);
  const date = new Date().toISOString().slice(0,10);
  // Pakai data URI — lebih kompatibel di WebView/Median daripada blob URL
  const dataUri = 'data:text/plain;charset=utf-8,' + encodeURIComponent('DOMPETKU_BACKUP\n' + json);
  const a = document.createElement('a');
  a.href = dataUri;
  a.download = `dompetku-backup-${date}.txt`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  showToast('Backup berhasil didownload ✓');
}

function importData(){
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.txt,.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        let text = ev.target.result.trim();
        // Support both .txt (dengan header) dan .json lama
        if(text.startsWith('DOMPETKU_BACKUP')) {
          text = text.replace('DOMPETKU_BACKUP', '').trim();
        }
        const data = JSON.parse(text);
        if(!data.txs || !data.wallets) throw new Error('Format tidak valid');
        showModal(`
          <div style="font-family:var(--font-display);font-size:1rem;font-weight:700;color:#fff;margin-bottom:8px">Restore Backup?</div>
          <div style="font-size:0.81rem;color:var(--text2);margin-bottom:6px">File: <b style="color:#fff">${file.name}</b></div>
          <div style="font-size:0.81rem;color:var(--text2);margin-bottom:20px">
            ${data.txs.length} transaksi · ${data.wallets.length} dompet<br>
            <span style="color:#ff6b6b">⚠ Data saat ini akan diganti!</span>
          </div>
          <div style="display:flex;gap:10px">
            <button onclick="hideModal()" style="flex:1;padding:12px;background:#1c1c2c;border:none;border-radius:12px;color:#bbb;font-family:var(--font-display);font-weight:700;font-size:0.81rem;cursor:pointer">Batal</button>
            <button onclick="doRestore(${JSON.stringify(JSON.stringify(data))})" style="flex:1;padding:12px;background:#c8f04a;border:none;border-radius:12px;color:#0b0b10;font-family:var(--font-display);font-weight:700;font-size:0.81rem;cursor:pointer">Restore</button>
          </div>
        `);
      } catch(err) {
        showToast('File tidak valid!','#ff6b6b','#fff');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

function doRestore(jsonStr){
  try {
    const data = JSON.parse(jsonStr);
    state.txs = data.txs; state.wallets = data.wallets;
    save(); hideModal(); go('home');
    showToast('Data berhasil direstore ✓');
  } catch { showToast('Gagal restore!','#ff6b6b','#fff'); }
}

// ─── WALLET DETAIL ────────────────────────────────────────────────
function renderWalletDetail(){
  const w=walletById(state.selectedWalletId);
  if(!w){ go('wallets'); return; }
  const txs=walletTxs(w.id,state.filter);

function submitTx(){
  const amt=parseInt((state.form.amount+'').replace(/\D/g,''));
  if(!state.form.walletId) return showToast('Pilih dompet dulu!','#ff6b6b','#fff');
  if(!amt||amt<=0) return showToast('Nominal tidak valid!','#ff6b6b','#fff');

  state.txs.unshift({ id:Date.now(), type:state.form.type, walletId:state.form.walletId, amount:amt, note:state.form.note.trim(), date:state.form.date });
  save();
  state.form={ type:'out', walletId:'', amount:'', note:'', date:today() };

  if(!state.wForm.name.trim()) return showToast('Isi nama dompet!','#ff6b6b','#fff');
  const id='w'+Date.now();
  state.wallets.push({ id, name:state.wForm.name.trim(), icon:state.wForm.icon, color:state.wForm.color, budget:parseInt(state.wForm.budget)||0 });
  const initBal = parseInt(state.wForm.balance)||0;

  state.wForm={ name:'', icon:'🪙', color:'#c8f04a', budget:'', balance:'' };

  if(!state.wForm.name.trim()) return showToast('Isi nama dompet!','#ff6b6b','#fff');

  w.name=state.wForm.name.trim(); w.icon=state.wForm.icon; w.color=state.wForm.color; w.budget=parseInt(state.wForm.budget)||0;
  // Handle balance override
  const newBal = state.wForm.balance!=='' ? parseInt(state.wForm.balance) : null;

// ─── CALCULATOR ───────────────────────────────────────────────────
function calcInput(val){
  const c = state.calc;
  if(val==='C'){ state.calc={ display:'0', expr:'', prev:0, op:'', fresh:true }; }
  else if(val==='⌫'){
    if(c.display.length>1) c.display=c.display.slice(0,-1);
    else c.display='0';
  }
  else if(val==='%'){
    c.display = String(parseFloat(c.display)/100);
  }
  else if(['+','-','×','÷'].includes(val)){
    c.prev = parseFloat(c.display);
    c.op = val; c.fresh = true;
    c.expr = c.display + ' ' + val;
  }
  else if(val==='='){
    if(!c.op) return;
    const a=c.prev, b=parseFloat(c.display);
    let res;
    if(c.op==='+') res=a+b;
    else if(c.op==='-') res=a-b;
    else if(c.op==='×') res=a*b;
    else if(c.op==='÷') res=b!==0?a/b:0;
    c.display = String(parseFloat(res.toFixed(10)));
    c.expr=''; c.op=''; c.fresh=true;
  }
  else if(val==='.'){
    if(c.fresh){ c.display='0.'; c.fresh=false; }
    else if(!c.display.includes('.')) c.display+='.';
  }
  else {
    if(c.fresh||c.display==='0'){ c.display=val; c.fresh=false; }
    else c.display+=val;
  }
  renderCalc();
}

function calcUseAsAmount(){
  const val = state.calc.display;
  const num = parseFloat(val);
  if(!isNaN(num) && num>0){
    state.form.amount = String(Math.round(num));
    go('add');
    showToast('Nominal diisi dari kalkulator ✓');
  }
}

function renderCalc(){
  const c = state.calc;
  const fmt = n => {
    const num = parseFloat(n);
    if(isNaN(num)) return n;
    return num.toLocaleString('id-ID', {maximumFractionDigits:8});
  };
  const btns = [
    ['C','%','⌫','÷'],
    ['7','8','9','×'],
    ['4','5','6','-'],
    ['1','2','3','+'],
    ['0','.',  '=','='],
  ];
  const btnStyle = (b) => {
    const isOp=['+','-','×','÷'].includes(b);
    const isEq=b==='=';
    const isFn=['C','%','⌫'].includes(b);
    const bg = isEq?'#c8f04a':isOp?'#252538':isFn?'#1e1e2e':'#16161f';
    const color = isEq?'#0b0b10':isOp?'#c8f04a':isFn?'#aaa':'#fff';
    return `background:${bg};color:${color}`;
  };

  let rowsHTML = '';
  for(let r=0;r<btns.length;r++){
    const row=btns[r];
    let cells='';
    let skip=false;
    for(let ci=0;ci<row.length;ci++){
      if(skip){skip=false;continue;}
      const b=row[ci];
      const isDouble=r===4&&ci===0;
      const isDoubleEq=r===4&&ci===2;
      if(isDouble){
        cells+=`<button onclick="calcInput('${b}')" style="flex:2;${btnStyle(b)};border:none;border-radius:18px;font-family:var(--font-display);font-weight:700;font-size:1.25rem;cursor:pointer;padding:20px;transition:opacity 0.1s" ontouchstart="this.style.opacity=0.7" ontouchend="this.style.opacity=1">${b}</button>`;
      } else if(isDoubleEq){
        cells+=`<button onclick="calcInput('=')" style="flex:2;${btnStyle('=')};border:none;border-radius:18px;font-family:var(--font-display);font-weight:800;font-size:1.4rem;cursor:pointer;padding:20px;transition:opacity 0.1s" ontouchstart="this.style.opacity=0.7" ontouchend="this.style.opacity=1">=</button>`;
        skip=true;
      } else {
        cells+=`<button onclick="calcInput('${b}')" style="flex:1;${btnStyle(b)};border:none;border-radius:18px;font-family:var(--font-display);font-weight:700;font-size:1.25rem;cursor:pointer;padding:20px;transition:opacity 0.1s" ontouchstart="this.style.opacity=0.7" ontouchend="this.style.opacity=1">${b}</button>`;
      }
    }
    rowsHTML+=`<div style="display:flex;gap:10px">${cells}</div>`;
  }

  document.getElementById('page-content').innerHTML=`
    <div style="padding:24px 16px 0" class="fade-up">
      <div style="font-size:0.69rem;letter-spacing:3px;color:var(--text3);text-transform:uppercase;margin-bottom:4px">Tools</div>
      <div style="font-family:var(--font-display);font-size:1.625rem;font-weight:800;color:#fff;margin-bottom:20px">Kalkulator</div>

      <!-- Display -->
      <div style="background:#090912;border:1px solid var(--border2);border-radius:22px;padding:20px 22px 16px;margin-bottom:16px">
        <div style="font-size:0.75rem;color:#444;min-height:18px;text-align:right;font-family:var(--font-display)">${c.expr||''}</div>
        <div style="font-family:var(--font-display);font-size:2.5rem;font-weight:800;color:#fff;text-align:right;margin-top:4px;word-break:break-all;line-height:1.1">${fmt(c.display)}</div>
        <div style="font-size:0.625rem;color:#333;text-align:right;margin-top:6px">Rp${parseFloat(c.display)||0>0?Number(parseFloat(c.display)).toLocaleString('id-ID'):'-'}</div>
      </div>

      <!-- Buttons -->
      <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px">
        ${rowsHTML}
      </div>

      <!-- Use as amount -->
      <button onclick="calcUseAsAmount()" style="width:100%;padding:14px;background:#1a2800;border:1px solid #c8f04a44;border-radius:16px;color:#c8f04a;font-family:var(--font-display);font-weight:700;font-size:0.875rem;cursor:pointer">
        ↗ Gunakan sebagai nominal transaksi
      </button>
    </div>
  `;
}

// ─── PWA ─────────────────────────────────────────────────────────
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

// ─── INIT ────────────────────────────────────────────────────────
// load dari localStorage sebagai data sementara/offline
load();
// Render hanya jika tidak ada config Supabase (mode offline)
const _sbCfg = getSupabaseCfg();
if (!_sbCfg.url || !_sbCfg.key) {
  // Mode offline — langsung tampilkan app tanpa login
  document.getElementById('auth-page').style.display = 'none';
  document.getElementById('user-bar').style.display = 'none';
  render();
}
// Jika ada config Supabase, onAuthStateChange di initAuth() yang handle render
</script>
</body>
</html>
