<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0b0b10">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dompetku">
<title>Dompetku</title>
<link rel="manifest" href="manifest.json">
<style>
  /*
   * Tidak ada request eksternal sama sekali.
   * Semua font = system font yang sudah ada di Android & iOS.
   * --font-display : heading/label bold (Google Sans / Roboto pakai weight 700-800)
   * --font-body    : teks biasa (Roboto = default Android, San Francisco = iOS)
   */
  :root {
    --font-display: 'Google Sans', 'Roboto', system-ui, -apple-system, sans-serif;
    --font-body:    'Roboto', system-ui, -apple-system, sans-serif;
  }
</style>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  /* Root font: clamp antara 14px (hp kecil) dan 16px (hp besar/tablet)
     Pakai 3.8vw sebagai nilai tengah — proporsional ke lebar layar */
  html { font-size: clamp(13px, 3.8vw, 16px); }
  html, body { height: 100%; overflow: hidden; }
  body { font-family: var(--font-body); background: #0b0b10; color: #f0f0f0; }
  input, select, textarea, button { font-family: var(--font-body); font-size: 1rem; }
  ::-webkit-scrollbar { display: none; }
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }

  #app { height: 100vh; display: flex; flex-direction: column; max-width: 420px; margin: 0 auto; }
  .page { flex: 1; overflow-y: auto; padding-bottom: 88px; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
  @keyframes slideIn { from{opacity:0;transform:translateX(30px)} to{opacity:1;transform:translateX(0)} }
  @keyframes pop { 0%{transform:scale(0.9)} 60%{transform:scale(1.05)} 100%{transform:scale(1)} }
  @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(-10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
  @keyframes shimmer { from{background-position:-200%} to{background-position:200%} }

  .fade-up { animation: fadeUp 0.3s ease both; }
  .slide-in { animation: slideIn 0.25s ease both; }

  /* NAV */
  .bottom-nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 420px;
    background: #111116; border-top: 1px solid #1e1e28;
    display: flex; padding: 10px 0 22px; z-index: 100;
  }
  .nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; background:none; border:none; cursor:pointer; padding:0; }
  .nav-icon { font-size:1.3rem; line-height:1; }
  .nav-label { font-size:0.65rem; font-family:var(--font-display); font-weight:700; color:#555; }
  .nav-label.active { color:#c8f04a; }
  .nav-add-btn {
    width:3.2rem; height:3.2rem; border-radius:16px; background:#c8f04a;
    display:flex; align-items:center; justify-content:center;
    font-family:var(--font-display); font-weight:800; font-size:1.8rem; color:#0b0b10;
    margin-top:-1.4rem; box-shadow:0 4px 24px rgba(200,240,74,0.4);
  }

  /* CARDS */
  .card { background:#16161d; border:1px solid #2a2a38; border-radius:16px; }

  /* WALLET CARD */
  .wallet-card {
    border-radius:20px; padding:20px;
    display:flex; align-items:center; gap:14px;
    cursor:pointer; transition:transform 0.15s, opacity 0.15s;
    position:relative; overflow:hidden;
  }
  .wallet-card:active { transform:scale(0.97); opacity:0.85; }
  .wallet-icon-wrap { width:3.3rem; height:3.3rem; border-radius:16px; background:rgba(0,0,0,0.2); display:flex; align-items:center; justify-content:center; font-size:1.6rem; flex-shrink:0; }
  .wallet-info { flex:1; min-width:0; }
  .wallet-name { font-family:var(--font-display); font-size:0.94rem; font-weight:800; color:#fff; }
  .wallet-budget { font-size:0.69rem; opacity:0.7; margin-top:2px; }
  .wallet-balance { font-family:var(--font-display); font-size:1.1rem; font-weight:800; text-align:right; flex-shrink:0; }
  .wallet-bar { position:absolute; bottom:0; left:0; height:3px; border-radius:99px; transition:width 0.5s ease; }

  /* TX ITEM */
  .tx-item { display:flex; align-items:center; gap:12px; padding:13px 16px; cursor:pointer; transition:opacity 0.15s; }
  .tx-item:active { opacity:0.7; }
  .tx-icon { width:2.5rem; height:2.5rem; border-radius:12px; background:#1e1e28; display:flex; align-items:center; justify-content:center; font-size:1.1rem; flex-shrink:0; }
  .tx-info { flex:1; min-width:0; }
  .tx-name { font-family:var(--font-display); font-size:0.81rem; font-weight:700; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .tx-sub { font-size:0.69rem; color:#555; margin-top:2px; }
  .tx-amount { font-family:var(--font-display); font-weight:800; font-size:0.875rem; flex-shrink:0; }

  /* FORM */
  .form-label { font-size:0.69rem; color:#666; letter-spacing:1px; text-transform:uppercase; margin-bottom:8px; }
  .form-input { width:100%; background:#16161d; border:1px solid #2a2a38; border-radius:14px; padding:14px 16px; color:#fff; font-size:0.875rem; outline:none; transition:border-color 0.2s; }
  .form-input:focus { border-color:#c8f04a; }

  /* PILLS */
  .filter-pill { padding:7px 14px; border-radius:99px; border:1px solid #2a2a38; background:#1a1a24; color:#888; font-family:var(--font-display); font-weight:700; font-size:0.69rem; cursor:pointer; transition:all 0.15s; }
  .filter-pill.active { background:#c8f04a; color:#0b0b10; border-color:#c8f04a; }

  /* TYPE TOGGLE */
  .type-toggle { display:flex; background:#16161d; border-radius:14px; padding:4px; border:1px solid #2a2a38; }
  .type-btn { flex:1; padding:11px; border-radius:10px; border:none; font-family:var(--font-display); font-weight:700; font-size:0.81rem; cursor:pointer; transition:all 0.2s; background:transparent; color:#555; }
  .type-btn.active-out { background:#ff6b6b; color:#fff; }
  .type-btn.active-in { background:#c8f04a; color:#0b0b10; }

  .big-btn { width:100%; padding:16px; border:none; border-radius:16px; font-family:var(--font-display); font-weight:800; font-size:1rem; cursor:pointer; transition:opacity 0.15s; }
  .big-btn:active { opacity:0.8; }

  .toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); padding:10px 20px; border-radius:99px; font-family:var(--font-display); font-weight:700; font-size:0.81rem; z-index:999; white-space:nowrap; animation:toastIn 0.3s ease; }

  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.78); display:flex; align-items:center; justify-content:center; z-index:998; padding:20px; }
  .modal-box { background:#1a1a24; border:1px solid #2a2a38; border-radius:20px; padding:24px; width:100%; max-width:360px; animation:pop 0.2s ease; max-height:80vh; overflow-y:auto; }

  .detail-row { display:flex; justify-content:space-between; padding:12px 16px; background:#1e1e28; border-radius:12px; }
  .detail-label { font-size:0.75rem; color:#666; }
  .detail-val { font-size:0.81rem; color:#ccc; font-weight:500; }

  .section-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
  .section-title { font-family:var(--font-display); font-size:0.81rem; font-weight:700; color:#fff; }
  .see-all { font-size:0.69rem; color:#c8f04a; font-family:var(--font-display); font-weight:700; background:none; border:none; cursor:pointer; }

  .empty-state { text-align:center; padding:36px 0; color:#444; font-size:0.81rem; }
  .empty-icon { font-size:2.25rem; margin-bottom:8px; }

  .back-btn { background:none; border:none; color:#c8f04a; font-family:var(--font-display); font-weight:700; font-size:0.81rem; cursor:pointer; margin-bottom:20px; display:flex; align-items:center; gap:6px; }
  .wallet-sel-item { display:flex; align-items:center; gap:12px; padding:13px 16px; border-radius:14px; cursor:pointer; transition:background 0.15s; border:2px solid transparent; }
  .wallet-sel-item:active { background:#1e1e28; }
  .wallet-sel-item.selected { border-color:#c8f04a; background:#1a2800; }
</style>
</head>
<body>
<div id="app">
  <div class="page" id="page-content"></div>
  <nav class="bottom-nav" id="bottom-nav"></nav>
</div>
<div class="toast" id="toast" style="display:none"></div>
<div class="modal-overlay" id="modal" style="display:none" onclick="if(event.target===this)hideModal()">
  <div class="modal-box" id="modal-box"></div>
</div>

<script>
// ─── WALLETS CONFIG ───────────────────────────────────────────────
const DEFAULT_WALLETS = [
  { id:'makan',   name:'Makan & Keperluan', icon:'🛒', color:'#ffb347', budget:500000 },
  { id:'arisan',  name:'Arisan',            icon:'🤝', color:'#ff6b6b', budget:200000 },
  { id:'paylater',name:'Paylater',          icon:'💳', color:'#ff6b6b', budget:150000 },
  { id:'tabungan',name:'Tabungan',          icon:'🏦', color:'#5b8fff', budget:250000 },
  { id:'trading', name:'Modal Trading',     icon:'📈', color:'#c8f04a', budget:250000 },
  { id:'darurat', name:'Dana Darurat',      icon:'🛡️', color:'#b388ff', budget:150000 },
  { id:'lainnya', name:'Lainnya',           icon:'📌', color:'#888',    budget:0 },
];

const STORAGE_KEY = 'dompetku_wallet_v1';
const WALLET_KEY  = 'dompetku_wallets_v1';

// ─── STATE ────────────────────────────────────────────────────────
let state = {
  page: 'home',          // home | wallets | wallet-detail | add | history | tx-detail | add-wallet | edit-wallet | backup
  txs: [],
  wallets: [],
  filter: 'minggu',
  selectedWalletId: null,
  selectedTxId: null,
  form: { type:'out', walletId:'', amount:'', note:'', date:today() },
  editingWallet: null,
  wForm: { name:'', icon:'🪙', color:'#c8f04a', budget:'' },
};

function load() {
  try { const r=localStorage.getItem(STORAGE_KEY); if(r) state.txs=JSON.parse(r); } catch{}
  try {
    const w=localStorage.getItem(WALLET_KEY);
    state.wallets = w ? JSON.parse(w) : JSON.parse(JSON.stringify(DEFAULT_WALLETS));
  } catch { state.wallets = JSON.parse(JSON.stringify(DEFAULT_WALLETS)); }
}
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.txs)); } catch{}
  try { localStorage.setItem(WALLET_KEY,  JSON.stringify(state.wallets)); } catch{}
}
function today() { return new Date().toISOString().slice(0,10); }
function formatRp(n) { return 'Rp'+Number(n).toLocaleString('id-ID'); }
function getWeekStart(d) { const dt=new Date(d); dt.setDate(dt.getDate()-dt.getDay()+1); return dt.toISOString().slice(0,10); }

function walletById(id) { return state.wallets.find(w=>w.id===id); }

// ─── WALLET BALANCE ───────────────────────────────────────────────
function walletTxs(walletId, filter) {
  const now = new Date();
  const thisWeek = getWeekStart(now.toISOString().slice(0,10));
  const thisMonth = now.toISOString().slice(0,7);
  return state.txs.filter(t => {
    if(t.walletId !== walletId) return false;
    if(filter==='minggu') return getWeekStart(t.date)===thisWeek;
    if(filter==='bulan') return t.date.slice(0,7)===thisMonth;
    return true;
  });
}
function walletBalance(walletId, filter) {
  return walletTxs(walletId, filter).reduce((s,t)=> t.type==='in' ? s+t.amount : s-t.amount, 0);
}
function walletSpent(walletId, filter) {
  return walletTxs(walletId, filter).filter(t=>t.type==='out').reduce((s,t)=>s+t.amount,0);
}

// ─── GLOBAL TOTALS ────────────────────────────────────────────────
function globalTotals(filter) {
  const now=new Date();
  const thisWeek=getWeekStart(now.toISOString().slice(0,10));
  const thisMonth=now.toISOString().slice(0,7);
  const txs = state.txs.filter(t=>{
    if(filter==='minggu') return getWeekStart(t.date)===thisWeek;
    if(filter==='bulan') return t.date.slice(0,7)===thisMonth;
    return true;
  });
  const totalIn  = txs.filter(t=>t.type==='in').reduce((s,t)=>s+t.amount,0);
  const totalOut = txs.filter(t=>t.type==='out').reduce((s,t)=>s+t.amount,0);
  return { totalIn, totalOut, saldo: totalIn-totalOut };
}

// ─── TOAST ───────────────────────────────────────────────────────
let toastTimer;
function showToast(msg,color='#c8f04a',textColor='#0b0b10'){
  const el=document.getElementById('toast');
  el.textContent=msg; el.style.background=color; el.style.color=textColor; el.style.display='block';
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.style.display='none',2200);
}

// ─── MODAL ───────────────────────────────────────────────────────
function showModal(html){ document.getElementById('modal-box').innerHTML=html; document.getElementById('modal').style.display='flex'; }
function hideModal(){ document.getElementById('modal').style.display='none'; }

// ─── NAV ─────────────────────────────────────────────────────────
function renderNav(){
  const p=state.page;
  const homeActive = p==='home';
  const walletActive = p==='wallets'||p==='wallet-detail'||p==='add-wallet'||p==='edit-wallet';
  const histActive = p==='history'||p==='tx-detail';
  document.getElementById('bottom-nav').innerHTML=`
    <button class="nav-btn" onclick="go('home')">
      <span class="nav-icon">🏠</span>
      <span class="nav-label ${homeActive?'active':''}">Home</span>
    </button>
    <button class="nav-btn" onclick="go('wallets')">
      <span class="nav-icon">👛</span>
      <span class="nav-label ${walletActive?'active':''}">Dompet</span>
    </button>
    <button class="nav-btn" onclick="go('add')">
      <div class="nav-add-btn">+</div>
      <span class="nav-label ${p==='add'?'active':''}" style="margin-top:2px">Catat</span>
    </button>
    <button class="nav-btn" onclick="go('history')">
      <span class="nav-icon">📋</span>
      <span class="nav-label ${histActive?'active':''}">Riwayat</span>
    </button>
    <button class="nav-btn" onclick="go('backup')">
      <span class="nav-icon">☁️</span>
      <span class="nav-label ${p==='backup'?'active':''}">Backup</span>
    </button>
  `;
}

// ─── RENDER MAIN ─────────────────────────────────────────────────
function render(){
  renderNav();
  const p=state.page;
  document.getElementById('page-content').scrollTop=0;
  if(p==='home')          renderHome();
  else if(p==='wallets')  renderWallets();
  else if(p==='wallet-detail') renderWalletDetail();
  else if(p==='add')      renderAdd();
  else if(p==='history')  renderHistory();
  else if(p==='tx-detail') renderTxDetail();
  else if(p==='add-wallet') renderAddWallet();
  else if(p==='edit-wallet') renderEditWallet();
  else if(p==='backup')   renderBackup();
}
function go(page){ state.page=page; render(); }

// ─── BACKUP & RESTORE ────────────────────────────────────────────
function exportData(){
  const data = { txs: state.txs, wallets: state.wallets, exportedAt: new Date().toISOString(), version: 1 };
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  a.href = url; a.download = `dompetku-backup-${date}.json`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast('Backup berhasil didownload ✓');
}

function importData(){
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if(!data.txs || !data.wallets) throw new Error('Format tidak valid');
        showModal(`
          <div style="font-family:var(--font-display);font-size:1rem;font-weight:700;color:#fff;margin-bottom:8px">Restore Backup?</div>
          <div style="font-size:0.81rem;color:#888;margin-bottom:6px">File: <b style="color:#fff">${file.name}</b></div>
          <div style="font-size:0.81rem;color:#888;margin-bottom:20px">
            ${data.txs.length} transaksi · ${data.wallets.length} dompet<br>
            <span style="color:#ff6b6b">⚠ Data saat ini akan diganti!</span>
          </div>
          <div style="display:flex;gap:10px">
            <button onclick="hideModal()" style="flex:1;padding:12px;background:#252530;border:none;border-radius:12px;color:#ccc;font-family:var(--font-display);font-weight:700;font-size:0.81rem;cursor:pointer">Batal</button>
            <button onclick="doRestore(${JSON.stringify(JSON.stringify(data))})" style="flex:1;padding:12px;background:#c8f04a;border:none;border-radius:12px;color:#0b0b10;font-family:var(--font-display);font-weight:700;font-size:0.81rem;cursor:pointer">Restore</button>
          </div>
        `);
      } catch(err) {
        showToast('File tidak valid!','#ff6b6b','#fff');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

function doRestore(jsonStr){
  try {
    const data = JSON.parse(jsonStr);
    state.txs = data.txs; state.wallets = data.wallets;
    save(); hideModal(); go('home');
    showToast('Data berhasil direstore ✓');
  } catch { showToast('Gagal restore!','#ff6b6b','#fff'); }
}

function renderBackup(){
  const txCount = state.txs.length;
  const wCount  = state.wallets.length;
  const lastBackupKey = 'dompetku_last_backup';
  const lastBackup = localStorage.getItem(lastBackupKey);

  document.getElementById('page-content').innerHTML=`
    <div style="padding:28px 16px" class="fade-up">
      <div style="font-size:0.69rem;letter-spacing:3px;color:#555;text-transform:uppercase;margin-bottom:4px">Data</div>
      <div style="font-family:var(--font-display);font-size:1.625rem;font-weight:800;color:#fff;margin-bottom:24px">Backup & Restore</div>

      <!-- INFO CARD -->
      <div class="card" style="padding:16px;margin-bottom:16px">
        <div style="font-size:0.69rem;color:#666;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">Data Saat Ini</div>
        <div style="display:flex;gap:12px">
          <div style="flex:1;background:#1e1e28;border-radius:12px;padding:14px;text-align:center">
            <div style="font-family:var(--font-display);font-size:1.5rem;font-weight:800;color:#c8f04a">${txCount}</div>
            <div style="font-size:0.69rem;color:#666;margin-top:2px">Transaksi</div>
          </div>
          <div style="flex:1;background:#1e1e28;border-radius:12px;padding:14px;text-align:center">
            <div style="font-family:var(--font-display);font-size:1.5rem;font-weight:800;color:#c8f04a">${wCount}</div>
            <div style="font-size:0.69rem;color:#666;margin-top:2px">Dompet</div>
          </div>
        </div>
      </div>

      <!-- EXPORT -->
      <div class="card" style="padding:20px;margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
          <div style="font-size:2rem">📥</div>
          <div>
            <div style="font-family:var(--font-display);font-size:0.94rem;font-weight:700;color:#fff">Download Backup</div>
            <div style="font-size:0.69rem;color:#666;margin-top:2px">Simpan data ke file .json di HP</div>
          </div>
        </div>
        <button class="big-btn" style="background:#c8f04a;color:#0b0b10" onclick="exportData()">⬇ Download Backup</button>
      </div>

      <!-- IMPORT -->
      <div class="card" style="padding:20px;margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
          <div style="font-size:2rem">📤</div>
          <div>
            <div style="font-family:var(--font-display);font-size:0.94rem;font-weight:700;color:#fff">Restore Backup</div>
            <div style="font-size:0.69rem;color:#666;margin-top:2px">Pulihkan data dari file backup</div>
          </div>
        </div>
        <button class="big-btn" style="background:#1e1e28;color:#fff;border:1px solid #2a2a38" onclick="importData()">⬆ Pilih File Backup</button>
      </div>

      <!-- TIPS -->
      <div style="background:#1a2800;border:1px solid #c8f04a33;border-radius:14px;padding:16px">
        <div style="font-size:0.75rem;color:#c8f04a;font-weight:700;margin-bottom:8px">💡 Tips Backup</div>
        <div style="font-size:0.75rem;color:#888;line-height:1.6">
          • Backup rutin seminggu sekali<br>
          • Simpan file di Google Drive / WhatsApp ke diri sendiri<br>
          • Saat ganti HP, restore dari file backup yang sama<br>
          • Data tidak otomatis tersinkron antar HP
        </div>
      </div>
    </div>
  `;
}

// ─── HOME ────────────────────────────────────────────────────────
function renderHome(){
  const {totalIn,totalOut,saldo}=globalTotals(state.filter);

  // recent txs all wallets
  const now=new Date();
  const thisWeek=getWeekStart(now.toISOString().slice(0,10));
  const thisMonth=now.toISOString().slice(0,7);
  const recent = state.txs.filter(t=>{
    if(state.filter==='minggu') return getWeekStart(t.date)===thisWeek;
    if(state.filter==='bulan') return t.date.slice(0,7)===thisMonth;
    return true;
  }).slice(0,6);

  const recentHTML = recent.length===0
    ? `<div class="empty-state"><div class="empty-icon">📭</div>Belum ada transaksi</div>`
    : recent.map((tx,i)=>{
        const w=walletById(tx.walletId);
        return `<div class="tx-item card fade-up" style="margin-bottom:8px;animation-delay:${i*0.04}s" onclick="openTxDetail(${tx.id})">
          <div class="tx-icon" style="background:${w?w.color+'22':'#1e1e28'}">${w?w.icon:'📌'}</div>
          <div class="tx-info">

function setFilter(f){ state.filter=f; render(); }
function setType(t){ state.form.type=t; render(); }
function setWallet(id){ state.form.walletId=id; render(); }
function setWIcon(e){ state.wForm.icon=e; render(); }
function setWColor(c){ state.wForm.color=c; render(); }

function openWallet(id){ state.selectedWalletId=id; go('wallet-detail'); }
function openTxDetail(id){ state.selectedTxId=id; go('tx-detail'); }

function editWallet(id){
  state.editingWallet=id;
  const w=walletById(id);
  state.wForm={ name:w.name, icon:w.icon, color:w.color, budget:w.budget||'' };
  go('edit-wallet');
}

function submitTx(){
  const amt=parseInt((state.form.amount+'').replace(/\D/g,''));
  if(!state.form.walletId) return showToast('Pilih dompet dulu!','#ff6b6b','#fff');
  if(!amt||amt<=0) return showToast('Nominal tidak valid!','#ff6b6b','#fff');
  if(!state.form.date) return showToast('Pilih tanggal!','#ff6b6b','#fff');
  state.txs.unshift({ id:Date.now(), type:state.form.type, walletId:state.form.walletId, amount:amt, note:state.form.note.trim(), date:state.form.date });
  save();
  state.form={ type:'out', walletId:'', amount:'', note:'', date:today() };
  go('home');
  showToast('Transaksi berhasil dicatat ✓');
}

function saveNewWallet(){
  if(!state.wForm.name.trim()) return showToast('Isi nama dompet!','#ff6b6b','#fff');
  const id='w'+Date.now();
  state.wallets.push({ id, name:state.wForm.name.trim(), icon:state.wForm.icon, color:state.wForm.color, budget:parseInt(state.wForm.budget)||0 });
  state.wForm={ name:'', icon:'🪙', color:'#c8f04a', budget:'' };
  save(); go('wallets');
  showToast('Dompet berhasil ditambahkan ✓');
}

function saveEditWallet(){
  if(!state.wForm.name.trim()) return showToast('Isi nama dompet!','#ff6b6b','#fff');
  const w=walletById(state.editingWallet);
  w.name=state.wForm.name.trim(); w.icon=state.wForm.icon; w.color=state.wForm.color; w.budget=parseInt(state.wForm.budget)||0;
  save(); go('wallets');
  showToast('Dompet berhasil diupdate ✓');
}

function confirmDelete(id){
  showModal(`
    <div style="font-family:var(--font-display);font-size:1rem;font-weight:700;color:#fff;margin-bottom:8px">Hapus Transaksi?</div>
    <div style="font-size:0.81rem;color:#888;margin-bottom:20px">Tindakan ini tidak bisa dibatalkan.</div>
    <div style="display:flex;gap:10px">
      <button onclick="hideModal()" style="flex:1;padding:12px;background:#252530;border:none;border-radius:12px;color:#ccc;font-family:var(--font-display);font-weight:700;font-size:0.81rem;cursor:pointer">Batal</button>
      <button onclick="deleteTx(${id})" style="flex:1;padding:12px;background:#ff6b6b;border:none;border-radius:12px;color:#fff;font-family:var(--font-display);font-weight:700;font-size:0.81rem;cursor:pointer">Hapus</button>
    </div>
  `);
}

function confirmDeleteWallet(id){
  const count=state.txs.filter(t=>t.walletId===id).length;
  showModal(`
    <div style="font-family:var(--font-display);font-size:1rem;font-weight:700;color:#fff;margin-bottom:8px">Hapus Dompet?</div>
    <div style="font-size:0.81rem;color:#888;margin-bottom:20px">${count>0?`Dompet ini punya <b style="color:#ff6b6b">${count} transaksi</b> yang juga akan ikut terhapus.`:'Tindakan ini tidak bisa dibatalkan.'}</div>
    <div style="display:flex;gap:10px">
      <button onclick="hideModal()" style="flex:1;padding:12px;background:#252530;border:none;border-radius:12px;color:#ccc;font-family:var(--font-display);font-weight:700;font-size:0.81rem;cursor:pointer">Batal</button>
      <button onclick="deleteWallet('${id}')" style="flex:1;padding:12px;background:#ff6b6b;border:none;border-radius:12px;color:#fff;font-family:var(--font-display);font-weight:700;font-size:0.81rem;cursor:pointer">Hapus</button>
    </div>
  `);
}

function deleteTx(id){
  state.txs=state.txs.filter(t=>t.id!==id);
  save(); hideModal(); go('history');
  showToast('Transaksi dihapus','#ff6b6b','#fff');
}

function deleteWallet(id){
  state.wallets=state.wallets.filter(w=>w.id!==id);
  state.txs=state.txs.filter(t=>t.walletId!==id);
  save(); hideModal(); go('wallets');
  showToast('Dompet dihapus','#ff6b6b','#fff');
}

// ─── PWA ─────────────────────────────────────────────────────────
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

// ─── INIT ────────────────────────────────────────────────────────
load();
render();
</script>
</body>
</html>
